groups:
  - name: argus_api_alerts
    rules:
      - alert: ArgusHighLatencyAlert
        expr: histogram_quantile(0.95, sum(rate(argus_api_request_duration_seconds_bucket[5m])) by (le)) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High API response latency detected on ARGUS endpoint"
          description: "The p95 request latency of the ARGUS API classification endpoint has exceeded 800ms (0.8s) over the last 5 minutes (current value: {{ $value }}s)."

      - alert: ArgusHighErrorRateAlert
        expr: (sum(rate(argus_api_requests_total{status=~"5.."}[5m])) / sum(rate(argus_api_requests_total[5m]))) * 100 > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High server error rate detected on ARGUS API"
          description: "The HTTP 5xx error rate has exceeded 2% over the last 5 minutes (current value: {{ $value }}%)."
