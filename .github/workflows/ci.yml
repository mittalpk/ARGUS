name: ARGUS CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Style and Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter
        run: ruff format --check .

  test:
    name: Unit Testing and Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest setuptools==69.5.1

      - name: Run Unit Tests
        run: |
          PYTHONPATH=. pytest tests/unit/

      - name: Dry-run Model Gate Verification
        run: |
          # Create a dummy MLflow experiment and run to verify gate check script works
          PYTHONPATH=. python -c "
          import mlflow
          mlflow.set_tracking_uri('mlruns')
          with mlflow.start_run() as r:
              mlflow.log_metric('val_apcer_at_1percent_bpcer', 0.05)
              print(r.info.run_id)
          " > dummy_run_id.txt
          CANDIDATE_RUN_ID=$(cat dummy_run_id.txt | tail -n 1 | tr -d ' ')
          PYTHONPATH=. python scripts/check_model_gate.py --candidate_run_id $CANDIDATE_RUN_ID

  docker-build-and-scan:
    name: Container Build and Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Cleanup Runner)
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: argus-api:latest
          outputs: type=docker,dest=/tmp/image.tar

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os'
          severity: 'HIGH,CRITICAL'
